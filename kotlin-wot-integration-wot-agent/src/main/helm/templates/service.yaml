apiVersion: v1
kind: Service
metadata:
  name: {{ include "wot-agent.fullname" . }}
  labels:
    {{- include "wot-agent.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.port }}
      protocol: TCP
      name: http
    - name: http-cap
      port: 8181
      protocol: TCP
      targetPort: 8181
  selector:
    {{- include "wot-agent.selectorLabels" . | nindent 4 }}
